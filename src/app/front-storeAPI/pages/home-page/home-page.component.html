<div>
  <h1 class="text-3xl font-bold font-montserrat">Todos los productos</h1>
  <h2 class="text-xl mb-5">Para todos los gusstos</h2>
</div>


<div
  class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-2 gap-3"
>
 <!-- Lógica de slice directamente en el template -->
@for (product of productsResource.value(); track $index) {
  <app-product-card [product]="product"></app-product-card>
}

<!-- Paginación -->
<app-pagination
  [pages]="totalPages()"
  [currentPage]="page()">
</app-pagination>
</div>
