@if( productsResource.isLoading() ) {
  <div class="flex justify-center items-center h-screen">
    <span class="loading loading-spinner loading-lg"></span>
  </div>
  }

  <!-- Producto -->
  @if( productsResource.hasValue() ) {

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 items-start">

    <!-- Imágenes -->
     <div class="w-full max-w-md mx-auto">
       <img [src]="productsResource.value().image"
       [alt]="productsResource.value().title"
       class="w-full h-auto object-contain rounded-xl shadow-md">
     </div>
    <!--  -->

     <!-- titulo  -->
    <div>
      <h2 class="text-2xl font-bold font-montserrat mb-2">
        {{ productsResource.value().title }}
      </h2>

      <div class="divider"></div>
        <!-- description  -->
      <p class="mt-4 text-2xl font-semibold">
        {{ productsResource.value().description}}
      </p>

        <!-- ratin and count  -->
      <div class="mt-6 grid grid-cols-2 sm:grid-cols-3 gap-4">

        <!-- Stock (Count) -->
        <div class="rounded-xl bg-secondary text-secondary-content p-4 shadow-md">
          <div class="flex items-center gap-2">
            <svg
              stroke="currentColor"
              viewBox="0 0 24 24"
              fill="none"
              class="h-5 w-5 text-white opacity-90"
            >
              <path
                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"
                stroke-width="2"
                stroke-linejoin="round"
                stroke-linecap="round"
              ></path>
            </svg>
            <span class="text-sm font-semibold">{{ productsResource.value().rating.count }}</span>
          </div>
          <p class="mt-1 text-xs opacity-80">Stock</p>
        </div>

        <!-- Rating -->
        <div class="rounded-xl bg-primary text-primary-content p-4 shadow-md">
          <div class="flex items-center gap-2">
            <svg
              stroke="currentColor"
              viewBox="0 0 24 24"
              fill="none"
              class="h-5 w-5 text-white opacity-90"
            >
              <path
                d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"
                stroke-width="2"
                stroke-linejoin="round"
                stroke-linecap="round"
              ></path>
            </svg>
            <span class="text-sm font-semibold">{{ productsResource.value().rating.rate }}</span>
          </div>
          <p class="mt-1 text-xs opacity-80">Rating</p>
        </div>

      </div>


    </div>




  </div>

  }
